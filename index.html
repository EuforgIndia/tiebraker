<!DOCTYPE html>
<html>
<head>
  <title>Badminton Score</title>
  <style>
    body { text-align: center; font-family: Arial; }
    .score { font-size: 50px; margin: 20px; }
    button { font-size: 20px; padding: 10px 20px; margin: 10px; }
  </style>
</head>
<body>

<h1>🏸 Badminton Score</h1>

<h2>Player A vs Player B</h2>

<div class="score">
  <span id="scoreA">0</span> - 
  <span id="scoreB">0</span>
</div>
<h2 id="winner" style="color: green;"></h2>
<h3 id="serverInfo">Server: Player A (Right)</h3>
<button onclick="addPoint('A')">+ Point A</button>
<button onclick="addPoint('B')">+ Point B</button>
<br>
<button onclick="undo()">Undo</button>

<script>
let scoreA = 0;
let scoreB = 0;
let history = [];
let gameOver = false;
let currentServer = 'A';

function addPoint(player) {
  if (gameOver) return;

  history.push({scoreA, scoreB, currentServer});

  // Point update
  if (player === 'A') scoreA++;
  else scoreB++;

  // Winner becomes next server
  currentServer = player;

  checkWinner();
  updateDisplay();
}

function undo() {
  if (history.length > 0) {
    let last = history.pop();
    scoreA = last.scoreA;
    scoreB = last.scoreB;
    currentServer = last.currentServer;

    gameOver = false;
    document.getElementById("winner").innerText = "";
    document.body.classList.remove("win-bg");

    updateDisplay();
  }
}

function checkWinner() {
  if (
    (scoreA >= 21 || scoreB >= 21) &&
    Math.abs(scoreA - scoreB) >= 2
  ) {
    gameOver = true;
  }

  if (scoreA === 30 || scoreB === 30) {
    gameOver = true;
  }
}

function updateDisplay() {
  document.getElementById("scoreA").innerText = scoreA;
  document.getElementById("scoreB").innerText = scoreB;

  // 🧠 Decide court side
  let serverScore = currentServer === 'A' ? scoreA : scoreB;
  let side = (serverScore % 2 === 0) ? "Right" : "Left";

  document.getElementById("serverInfo").innerText =
    `Server: Player ${currentServer} (${side})`;

  if (gameOver) {
    let winner = scoreA > scoreB ? "Player A Wins!" : "Player B Wins!";
    document.getElementById("winner").innerText = winner;
  }
}
</script>

</body>
</html>
