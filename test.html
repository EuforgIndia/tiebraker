<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .share-btn {
            background: #25D366;
            color: white;
        }
        .copy-btn {
            background: #2196F3;
            color: white;
        }
        .data-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            border-left: 4px solid #25D366;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .status {
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📤 Share Data Demo</h2>
        
        <div class="data-box">
            <strong>Match Score:</strong>
            <div id="scoreData">Player A: 21 - Player B: 15</div>
        </div>

        <input type="text" id="customMessage" placeholder="Or enter custom message to share" value="Check out my badminton score!">

        <button class="share-btn" onclick="shareToKodular()">📱 Share to WhatsApp/Other Apps</button>
        <button class="copy-btn" onclick="copyToClipboard()">📋 Copy to Clipboard</button>
        <button class="share-btn" onclick="saveToKodular()">💾 Save Data to Kodular</button>

        <div id="status" class="status"></div>
    </div>

    <script>
        // Function to share data to Kodular
        function shareToKodular() {
            let message = document.getElementById('customMessage').value;
            let scoreData = document.getElementById('scoreData').innerText;
            let fullMessage = message + "\n\n" + scoreData + "\n\nSent from ShuttleScore App";
            
            // Method 1: Using Kodular JavaScript interface
            if (typeof window.Kodular !== 'undefined' && window.Kodular.shareText) {
                window.Kodular.shareText(fullMessage);
                showStatus('Sharing via Kodular...', 'success');
            }
            // Method 2: Using WebViewString (Alternative for Kodular)
            else if (window.AppInventor && window.AppInventor.getWebViewString) {
                window.AppInventor.setWebViewString(fullMessage);
                showStatus('Data sent to Kodular!', 'success');
            }
            // Method 3: Native Web Share API
            else if (navigator.share) {
                navigator.share({
                    title: 'Badminton Score',
                    text: fullMessage
                }).catch(err => {
                    if(err.name !== 'AbortError') {
                        showStatus('Share failed: ' + err.message, 'error');
                    }
                });
            }
            // Method 4: Fallback - create WhatsApp link
            else {
                let whatsappUrl = 'https://wa.me/?text=' + encodeURIComponent(fullMessage);
                window.open(whatsappUrl, '_blank');
                showStatus('Opening WhatsApp...', 'success');
            }
        }

        // Function to copy to clipboard
        function copyToClipboard() {
            let message = document.getElementById('customMessage').value;
            let scoreData = document.getElementById('scoreData').innerText;
            let fullMessage = message + "\n\n" + scoreData;
            
            // Try modern clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(fullMessage)
                    .then(() => showStatus('✓ Copied to clipboard!', 'success'))
                    .catch(() => fallbackCopy(fullMessage));
            } else {
                fallbackCopy(fullMessage);
            }
        }

        // Fallback copy method
        function fallbackCopy(text) {
            let textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showStatus('✓ Copied to clipboard!', 'success');
            } catch (err) {
                showStatus('Failed to copy', 'error');
            }
            document.body.removeChild(textarea);
        }

        // Function to save data to Kodular
        function saveToKodular() {
            let data = {
                score: document.getElementById('scoreData').innerText,
                message: document.getElementById('customMessage').value,
                timestamp: new Date().toISOString()
            };
            
            let jsonData = JSON.stringify(data);
            
            // Send to Kodular via WebViewString
            if (window.AppInventor && window.AppInventor.setWebViewString) {
                window.AppInventor.setWebViewString(jsonData);
                showStatus('Data saved to Kodular!', 'success');
            } else if (window.Kodular && window.Kodular.saveData) {
                window.Kodular.saveData(jsonData);
                showStatus('Data saved!', 'success');
            } else {
                showStatus('Kodular interface not found', 'error');
            }
        }

        // Function to receive data from Kodular
        function receiveFromKodular(data) {
            if (data) {
                try {
                    let parsed = JSON.parse(data);
                    if (parsed.score) {
                        document.getElementById('scoreData').innerText = parsed.score;
                    }
                    if (parsed.message) {
                        document.getElementById('customMessage').value = parsed.message;
                    }
                    showStatus('Data received from Kodular!', 'success');
                } catch(e) {
                    document.getElementById('customMessage').value = data;
                    showStatus('Message received: ' + data, 'success');
                }
            }
        }

        // Show status message
        function showStatus(message, type) {
            let statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            setTimeout(() => {
                statusDiv.className = 'status';
            }, 3000);
        }

        // Check if running in Kodular
        window.onload = function() {
            // Check for incoming data from Kodular
            if (window.AppInventor && window.AppInventor.getWebViewString) {
                let incomingData = window.AppInventor.getWebViewString();
                if (incomingData && incomingData !== '') {
                    receiveFromKodular(incomingData);
                }
            }
            
            showStatus('Ready! Tap share to send data', 'success');
        };
    </script>
</body>
</html>
